---
layout: default
---
<!-- 文章页布局：用于单篇博客文章 -->

{%-include back_link.html-%}

<article>
  <p class="post-meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: site.theme_config.date_format }}</time>
  </p>
  
  <h1>{{ page.title }}</h1>

  {{ content }}

  {%- if page.issue_url -%}
  <hr style="border: none; border-top: 1px solid #ddd; margin: 2em 0;">
  <p class="post-meta">
    <a href="{{ page.issue_url }}" target="_blank" rel="noopener noreferrer">
      → 在 GitHub Issue 中查看原文 / 发表评论
    </a>
  </p>
  {%- endif -%}
</article>
